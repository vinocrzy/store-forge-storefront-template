# Netlify Configuration for Next.js Storefront Template
# Production-optimized caching, compression, and security headers

[build]
  command = "npm run build"
  publish = ".next"

# ✅ Next.js SSR/dynamic routes — handled by @netlify/plugin-nextjs
# DO NOT use SPA-style "/* → /index.html" redirect here; it breaks dynamic routes
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ✅ PERFORMANCE: Cache static assets for 1 year (immutable)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ✅ SECURITY: Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
